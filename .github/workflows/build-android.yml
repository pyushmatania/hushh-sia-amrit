name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build web app
        run: npm run build

      - name: Remove live-reload server config
        run: sed -i '/server:/,/}/d' capacitor.config.ts || true

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Copy app icon to Android resources
        run: |
          # Generate adaptive icon resources from the app icon
          ICONS_DIR="android/app/src/main/res"
          for size_dir in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
            dir=$(echo $size_dir | cut -d: -f1)
            size=$(echo $size_dir | cut -d: -f2)
            mkdir -p "$ICONS_DIR/mipmap-$dir"
            if command -v convert &> /dev/null; then
              convert public/app-icon.png -resize ${size}x${size} "$ICONS_DIR/mipmap-$dir/ic_launcher.png"
              convert public/app-icon.png -resize ${size}x${size} "$ICONS_DIR/mipmap-$dir/ic_launcher_round.png"
              convert public/app-icon.png -resize ${size}x${size} "$ICONS_DIR/mipmap-$dir/ic_launcher_foreground.png"
            else
              cp public/icon-${size}.png "$ICONS_DIR/mipmap-$dir/ic_launcher.png" 2>/dev/null || true
              cp public/icon-${size}.png "$ICONS_DIR/mipmap-$dir/ic_launcher_round.png" 2>/dev/null || true
              cp public/icon-${size}.png "$ICONS_DIR/mipmap-$dir/ic_launcher_foreground.png" 2>/dev/null || true
            fi
          done
          echo "App icons copied to Android resources"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hushh-jeypore-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
