name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build web app
        run: npm run build

      - name: Remove live-reload server config
        run: |
          node -e "
          const fs = require('fs');
          let content = fs.readFileSync('capacitor.config.ts', 'utf8');
          // Remove entire server block from config
          content = content.replace(/server:\s*\{[^}]*\},?\s*/s, '');
          fs.writeFileSync('capacitor.config.ts', content);
          console.log('Server config removed');
          console.log(content);
          "

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Replace app icon and splash screen
        run: |
          ICONS_DIR="android/app/src/main/res"
          
          # Generate launcher icons from PWA icon (latest branding)
          ICON_SRC="public/pwa-icon-512.png"
          if [ ! -f "$ICON_SRC" ]; then ICON_SRC="public/app-icon.png"; fi
          for size_dir in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
            dir=$(echo $size_dir | cut -d: -f1)
            size=$(echo $size_dir | cut -d: -f2)
            mkdir -p "$ICONS_DIR/mipmap-$dir"
            convert "$ICON_SRC" -resize ${size}x${size} "$ICONS_DIR/mipmap-$dir/ic_launcher.png"
            convert "$ICON_SRC" -resize ${size}x${size} "$ICONS_DIR/mipmap-$dir/ic_launcher_round.png"
            convert "$ICON_SRC" -resize ${size}x${size} "$ICONS_DIR/mipmap-$dir/ic_launcher_foreground.png"
          done
          
          # Create a solid dark splash screen (no Capacitor logo)
          for size_dir in mdpi:480x800 hdpi:720x1280 xhdpi:960x1600 xxhdpi:1440x2560 xxxhdpi:1440x2560; do
            dir=$(echo $size_dir | cut -d: -f1)
            dims=$(echo $size_dir | cut -d: -f2)
            mkdir -p "$ICONS_DIR/drawable-$dir"
            convert -size $dims xc:"#050505" "$ICONS_DIR/drawable-$dir/splash.png"
          done
          mkdir -p "$ICONS_DIR/drawable"
          convert -size 1440x2560 xc:"#050505" "$ICONS_DIR/drawable/splash.png"
          
          echo "App icons and splash screens configured"

      - name: Patch Android theme for dark splash
        run: |
          STYLES="android/app/src/main/res/values/styles.xml"
          if [ -f "$STYLES" ]; then
            sed -i 's|@drawable/splash|@drawable/splash|g' "$STYLES"
            sed -i '/<style name="AppTheme.NoActionBar"/,/<\/style>/ {
              /<item name="android:background">/d
            }' "$STYLES"
          fi

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hushh-jeypore-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
